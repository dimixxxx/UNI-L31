<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registration page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="homepage.html">
            <img src="./img/fries.png" alt="" class="d-inline-block align-text-top" style="max-height: 40px;">
            FastFood</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
                <a class="nav-link" aria-current="page" href="homepage.html">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active-page" href="login.html">Login</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="register.html">Registrati</a>
            </li>
        </ul>
        </div>
    </div>
    </nav>
    <div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow">
                <h2 class="title-x2 mb-4">Accedi al tuo account</h2>
                <div id="message" class="mb-3"></div>
                <form id="loginForm">
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
                        <label for="email">Email</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="pwd" name="pwd" placeholder="Password" required>
                        <label for="pwd">Password</label>
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary">Accedi</button>
                    </div>
                    <div class="d-grid mb-3">
                        <button type="button" class="btn btn-outline-primary" onclick="window.location.href='register.html'">Crea un account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const pwd = document.getElementById('pwd').value;

    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, pwd })
        });

        let data;
        try {
            data = await res.json();
        } catch (err) {
            data = { message: 'Risposta non valida dal server' };
        }

        if (res.ok) {
            document.getElementById('message').innerHTML =
                `<div class="alert alert-success">${data.message}</div>`;
            window.location.href = 'dashboard.html'; // Redirect to register page on successful login
        } else {
            document.getElementById('message').innerHTML =
                `<div class="alert alert-danger">${data.message || 'Errore di login'}</div>`;
        }
    } catch (err) {
        document.getElementById('message').innerHTML =
            `<div class="alert alert-danger">Errore di rete</div>`;
    }
});
</script>

</body>
