<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registration page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="homepage.html">
            <img src="./img/fries.png" alt="" class="d-inline-block align-text-top" style="max-height: 40px;">
            FastFood</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
                <a class="nav-link" aria-current="page" href="homepage.html">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="login.html">Login</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active-page" href="register.html">Registrati</a>
            </li>
        </ul>
        </div>
    </div>
    </nav>

        <div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow">
                <h2 class="title-x2 mb-4">Registrati al nostro portale</h2>
                <form id = "registerForm">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="nome" name="nome" placeholder="Nome" required>
                        <label for="nome">Nome</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="cognome" name="cognome" placeholder="Cognome" required>
                        <label for="cognome">Cognome</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
                        <label for="email">Email</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="pwd" name="pwd" placeholder="Password" required>
                        <label for="pwd">Password</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="cpwd" name="cpwd" placeholder="ConfermaPassword" required>
                        <label for="cpwd">Conferma Password</label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label d-block">Tipo di account</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="accountType" id="cliente" value="cliente">
                            <label class="form-check-label" for="cliente">Cliente</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="accountType" id="ristoratore" value="ristoratore">
                            <label class="form-check-label" for="ristoratore">Ristoratore</label>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Crea un account</button>
                    </div>
                    <div class="text-center mt-3">
                        <p>Sei gia iscritto? <a href="login.html">Accedi</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (event) => {
        event.preventDefault(); // Prevent the default form submission

        const form = event.target;
        const data = {
            nome: form.nome.value.trim(),
            cognome: form.cognome.value.trim(),
            email: form.email.value.trim(),
            pwd: form.pwd.value,
            cpwd: form.cpwd.value,
            accountType: Array.from(form.querySelectorAll('input[name="accountType"]:checked')).map(el => el.value)
        };

        //console.log('Dati inviati:', data);

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
            const json = await res.json();
            if (res.ok) {
                alert('Registrazione avvenuta con successo!');
                window.location.href = 'login.html'; // Redirect to login page
            } else {
                alert('Errore: ' + (json.message || 'controlla i dati inseriti'));
            }
        } catch (error) {
            console.error(error);
            alert('Si è verificato un errore durante la registrazione. Riprova più tardi.');
        }
    });
</script>


</body>
