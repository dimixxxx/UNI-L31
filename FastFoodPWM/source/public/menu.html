<div class="container my-4">
  <div class="card">
    <div class="card-body" style="min-height: 150px;" id="collapseParent">

      <!-- Bottoni affiancati -->
      <div class="d-flex justify-content-start mb-3">
        <button class="btn btn-primary me-2" type="button" data-bs-toggle="collapse" data-bs-target="#collapsePiatti" aria-expanded="false" aria-controls="collapsePiatti">
            Ricerca Piatti
        </button>
        <button class="btn btn-success" type="button" data-bs-toggle="collapse" data-bs-target="#collapseRistoranti" aria-expanded="false" aria-controls="collapseRistoranti">
            Ricerca Ristoranti
        </button>
      </div>

      <!-- Collapse Piatti -->
      <div class="collapse" id="collapsePiatti">
            <h5 class="mb-4">Trova il tuo piatto desiderato</h5>
        <div class="card card-body">  
        <form>
            <div class="mb-3">
                <label for="piatto" class="form-label">Nome piatto</label>
                <input type="text" class="form-control" id="piatto" placeholder="Cerca per nome...">
            </div>
        <div class="row mb-3">
            <div class="col">
                <label for="prezzoMin" class="form-label">Prezzo minimo</label>
                <input type="number" class="form-control" id="prezzoMin" placeholder="Min">
            </div>
            <div class="col">
                <label for="prezzoMax" class="form-label">Prezzo massimo</label>
                <input type="number" class="form-control" id="prezzoMax" placeholder="Max">
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <label for="ingredienti" class="form-label">Ingredienti</label>
                <input type="text" class="form-control" id="ingredienti" placeholder="es. pomodoro, mozzarella...">
            </div>
            <div class="col">
                <label for="escludiAllergeni" class="form-label">Escludi allergeni</label>
                <input type="text" class="form-control" id="escludiAllergeni" placeholder="es. noci, latte...">
            </div>
        </div>
          <button type="submit" class="btn btn-primary">Cerca piatti</button>
          <button type="reset" class="btn btn-secondary">Reset filtri</button>
        </form>
        </div>
      </div>

      <!-- Collapse Ristoranti -->
      <div class="collapse" id="collapseRistoranti">
          <h5 class="mb-4">Trova il ristorante desiderato</h5>
        <div class="card card-body">
          <form>
            <div class="mb-3">
                <label for="ristorante" class="form-label mb-3 flex-grow-1">Nome, descrizione o indirizzo del ristorante</label>
                <div class="d-flex gap-3">
                  <input type="text" class="form-control flex-grow-1" id="ristorante" placeholder="Cerca ristorante...">
                  <button type="reset" class="btn btn-secondary w-25">Reset ricerca</button>
                </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  document.querySelectorAll('[data-bs-toggle="collapse"]').forEach(button => {
    button.addEventListener('click', () => {
      const targetId = button.getAttribute('data-bs-target');
      const targetElement = document.querySelector(targetId);

      if (targetElement.classList.contains('show')) {
        return;
      }
      document.querySelectorAll('.collapse.show').forEach(openEl => {
        if (openEl !== targetElement) {
          const collapseInstance = bootstrap.Collapse.getInstance(openEl);
          collapseInstance.hide();
        }
      });
    });
  });
</script>
